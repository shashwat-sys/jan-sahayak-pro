name: JanSahayakPro
options:
  bundleIdPrefix: org.janman
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    PRODUCT_BUNDLE_IDENTIFIER: org.janman.JanSahayakPro
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  JanSahayakPro:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Resources/Info.plist
    settings:
      base:
        INFOPLIST_FILE: Sources/Resources/Info.plist
        PRODUCT_NAME: JanSahayakPro
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    scheme:
      testTargets: []
